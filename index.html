<!DOCTYPE html>
<html lang="da">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

<body>
<div id="a"></div>
<script>
var RND=2.5,TM_PCT=0.90,LO=4,HI=6,INC=0.02,DEC=-0.05;
function rnd(v){return Math.round(v/RND)*RND}
function calcTM(rm){return rnd(rm*TM_PCT)}
function calcTgt(tm,i){return rnd(tm*i)}
function sbsSt(done,goal){if(done===undefined||done==="")return null;var p=goal.split("-").map(Number);var lo=p[0],hi=p[1]||p[0];done=Number(done);if(done<lo)return{l:"TM falder",n:DEC};if(done>hi)return{l:"TM stiger",n:INC};return{l:"OK",n:0}}
function nxtTM(tm,adj){return rnd(tm*(1+adj))}
var PH=[{wk:14,ph:"Fundament",int:0.80,reps:3,rir:2,sg:"4-6"},{wk:15,ph:"Progression",int:0.85,reps:2,rir:2,sg:"4-6"},{wk:16,ph:"Intensitet",int:0.875,reps:2,rir:1,sg:"4-6"},{wk:17,ph:"Taper",int:0.775,reps:4,rir:3,sg:"2-4"},{wk:18,ph:"Minimal",int:0.70,reps:5,rir:2,sg:"2-3"}];
function sessA(wk){var tp=wk>=17;return{day:"MANDAG",type:"FULL BODY A",ex:[{n:"Box Jumps",s:tp?"2x3":"3x3",cat:"POWER"},{n:"Back Squat",sbs:1,lift:"squat",cat:"STRENGTH"},{n:"KB Swings",s:tp?"1x8":"2x8",cat:"STRENGTH"},{n:"Bench Press",sbs:1,lift:"bench",cat:"STRENGTH",note:"Superset m/ pull-up"},{n:"Pull-up / Pulldown",s:tp?"3x6-8":"4x6-8",cat:"STRENGTH"},{n:"Tempo RDL (3s ecc.)",s:tp?"1x8":"2x8-10",cat:"ACC"},{n:"Calf Raise",s:"2x"+(tp?"8-10":"10-12"),cat:"ACC"},{n:"Pallof Press",s:"2x"+(tp?"8ea":"10ea"),cat:"ACC"}]}}
function sessB(wk){var tp=wk>=17;return{day:"FREDAG",type:"FULL BODY B",ex:[{n:"Broad Jumps",s:tp?"2x3":"3x3",cat:"POWER"},{n:"Trap Bar DL",sbs:1,lift:"trapbar",cat:"STRENGTH"},{n:"Bulgarian Split Squat",s:tp?"1x6-8ea":"2x6-8ea",cat:"STRENGTH"},{n:"Incline Bench",sbs:1,lift:"incline",cat:"STRENGTH",note:"Superset m/ row"},{n:"DB Chest Supported Row",s:tp?"2x8-10":"3x8-10",cat:"STRENGTH"},{n:"Tibialis Raises",s:"2x15-20",cat:"ACC"},{n:"Copenhagen Plank",s:"2x20-30s ea",cat:"ACC"},{n:"DB Lateral Raises",s:tp?"1x12-15":"2x12-15",cat:"ACC"},{n:"Dead Bug",s:tp?"1x8ea":"2x8ea",cat:"ACC"}]}}
var SK="msbs-v3";
function LD(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function SV(){localStorage.setItem(SK,JSON.stringify({rm:RM,tm:TM,bw:BW,logs:LOGS,cwk:S.cwk}))}
var S={vw:"dash",cwk:14,stype:""};
var RM={squat:100,trapbar:130,bench:90,incline:70};
var TM={squat:90,trapbar:117,bench:81,incline:63};
var BW=95;var LOGS={};var SLOG={};
var st=LD();if(st.rm)RM=st.rm;if(st.tm)TM=st.tm;if(st.bw)BW=st.bw;if(st.logs)LOGS=st.logs;if(st.cwk)S.cwk=st.cwk;
function uSL(k,v){SLOG[k]=v}
function E(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function doExport(){var b=new Blob([JSON.stringify({rm:RM,tm:TM,bw:BW,logs:LOGS},null,2)],{type:"application/json"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="msbs-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();document.body.removeChild(a)}
function doImport(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(ev){var f=ev.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.rm)RM=d.rm;if(d.tm)TM=d.tm;if(d.bw)BW=d.bw;if(d.logs)LOGS=d.logs;SV();R();alert("Importeret!")}catch(x){alert("Fejl")}};rd.readAsText(f)};inp.click()}
function saveSess(){var wk="w"+S.cwk,sk=S.stype;if(!LOGS[wk])LOGS[wk]={};LOGS[wk][sk]=JSON.parse(JSON.stringify(SLOG));LOGS[wk][sk].at=new Date().toISOString();var sess=S.stype=="A"?sessA(S.cwk):sessB(S.cwk);var p=PH.find(function(x){return x.wk==S.cwk});sess.ex.forEach(function(ex){if(ex.sbs&&SLOG["sets_"+ex.lift]){var st=sbsSt(SLOG["sets_"+ex.lift],p.sg);if(st&&st.n!==0)TM[ex.lift]=nxtTM(TM[ex.lift],st.n)}});SV();S.vw="dash";R()}

h+='<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px">';

if(v=="dash"){

h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;font-weight:800;letter-spacing:0.1em">SESSION '+c[0]+'</span>'+(c[4]?'<span style="font-size:11px;color:#4ade80">DONE</span>':'')+'</div>';

h+='<div style="font-size:10px;color:#fff;font-weight:700;margin-top:8px">'+(c[4]?'SE LOG':'START')+'</div></button>'}

h+='<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:16px">';
h+='<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:10px">TRAINING MAX</div>';

for(var li=0;li<lifts.length;li++){var l=lifts[li];
h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)">';
h+='<span style="font-size:12px;color:#999">'+l[1]+'</span>';
h+='<div><span style="font-size:16px;font-weight:800">'+TM[l[0]]+'</span><span style="font-size:10px;color:#555"> kg &rarr; '+calcTgt(TM[l[0]],p.int)+' kg</span></div></div>'}
h+='</div></div>'}
if(v=="session"){
var sess=S.stype=="A"?sessA(cwk):sessB(cwk);
h+='<div style="padding:20px">';
h+='<button onclick="S.vw=\'dash\';R()" style="background:none;border:none;color:#888;font-size:12px;font-weight:600;padding:0;margin-bottom:12px">&larr; Tilbage</button>';
h+='<div style="font-size:10px;color:#555;letter-spacing:0.12em;font-weight:600">UGE '+cwk+' - '+p.ph.toUpperCase()+'</div>';
h+='<div style="font-size:20px;font-weight:900;margin-bottom:16px">'+sess.day+' - '+sess.type+'</div>';
var curCat="";
for(var ei=0;ei<sess.ex.length;ei++){var ex=sess.ex[ei];
if(ex.cat!=curCat){curCat=ex.cat;var cc=curCat=="POWER"?"#f0a030":curCat=="STRENGTH"?"#fff":"#666";
h+='<div style="font-size:9px;letter-spacing:0.2em;color:'+cc+';font-weight:700;margin-top:16px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06)">'+curCat+'</div>'}
if(ex.sbs){
var tm=TM[ex.lift],tgt=calcTgt(tm,p.int);
var sd=SLOG["sets_"+ex.lift];var status=sbsSt(sd,p.sg);
var sc=!status?"#555":status.n>0?"#4ade80":status.n<0?"#e55":"#eab308";
h+='<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)">';
h+='<div style="font-size:13px;font-weight:800">'+E(ex.n)+'<span style="font-size:9px;color:#888;margin-left:6px">SBS</span></div>';
if(ex.note)h+='<div style="font-size:9px;color:#555;margin-top:2px">'+E(ex.note)+'</div>';
h+='<div style="font-size:10px;color:#666;margin-top:4px">'+p.sg+' set x '+p.reps+' reps @ '+tgt+' kg ('+Math.round(p.int*100)+'% TM) RIR '+p.rir+'</div>';
h+='<div style="display:flex;gap:8px;margin-top:8px;align-items:center">';
h+='<div><div style="font-size:8px;color:#555;margin-bottom:2px">ACTUAL KG</div>';
h+='<input type="number" value="'+E(SLOG["act_"+ex.lift]||tgt)+'" oninput="uSL(\'act_'+ex.lift+'\',this.value)" style="background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:#fff;padding:6px 8px;font-size:14px;font-weight:700;width:70px;text-align:center;font-family:inherit;box-sizing:border-box"></div>';
h+='<div><div style="font-size:8px;color:#555;margin-bottom:2px">SETS DONE</div>';
h+='<input type="number" value="'+E(sd||"")+'" oninput="uSL(\'sets_'+ex.lift+'\',this.value);R()" placeholder="'+p.sg+'" style="background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:#fff;padding:6px 8px;font-size:14px;font-weight:700;width:70px;text-align:center;font-family:inherit;box-sizing:border-box"></div>';
h+='<div style="text-align:center"><div style="font-size:8px;color:#555;margin-bottom:2px">STATUS</div>';
h+='<div style="font-size:13px;font-weight:800;color:'+sc+'">'+(status?status.l:"--")+'</div></div></div>';
h+='<div style="display:flex;gap:4px;margin-top:6px">';
for(var si=1;si<=6;si++){h+='<input type="number" value="'+E(SLOG[ex.lift+"_s"+si]||"")+'" oninput="uSL(\''+ex.lift+'_s'+si+'\',this.value)" placeholder="S'+si+'" style="flex:1;background:#111;border:1px solid rgba(255,255,255,0.04);border-radius:2px;color:#ccc;padding:4px 2px;font-size:9px;text-align:center;font-family:inherit;max-width:38px;box-sizing:border-box">'}
h+='<span style="font-size:7px;color:#444;align-self:center">reps</span></div>';
h+='</div>'}
else{
h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">';
h+='<div><div style="font-size:12px;font-weight:600;color:#ccc">'+E(ex.n)+'</div>';
h+='<div style="font-size:9px;color:#555">'+E(ex.s)+'</div></div>';
if(ex.s&&ex.s.indexOf("x")>-1){h+='<input type="number" value="'+E(SLOG["wt_"+ex.n]||"")+'" oninput="uSL(\'wt_'+E(ex.n)+'\',this.value)" placeholder="kg" style="background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:2px;color:#fff;padding:4px 6px;font-size:11px;width:55px;text-align:center;font-family:inherit;box-sizing:border-box">'}
h+='</div>'}}
h+='<div style="margin-top:20px"><div style="font-size:9px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:4px">NOTER</div>';
h+='<textarea oninput="uSL(\'notes\',this.value)" placeholder="Energi, restitution..." style="width:100%;background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:2px;padding:8px;color:#fff;font-size:11px;min-height:50px;box-sizing:border-box">'+(SLOG.notes||"")+'</textarea></div>';
h+='<div style="margin-top:14px"><div style="font-size:9px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:6px">RESTITUTION (1-10)</div>';
h+='<div style="display:flex;gap:4px">';
for(var ri=1;ri<=10;ri++){var rc=SLOG.rec==ri?(ri<=3?"#e55":ri<=6?"#eab308":"#4ade80"):"#111";
h+='<button onclick="uSL(\'rec\','+ri+');R()" style="flex:1;padding:6px 0;border:none;border-radius:2px;font-size:10px;font-weight:700;background:'+rc+';color:'+(SLOG.rec==ri?'#000':'#555')+'">'+ri+'</button>'}
h+='</div></div>';
h+='<button onclick="saveSess()" style="width:100%;padding:14px;border:none;border-radius:2px;font-size:13px;font-weight:800;letter-spacing:0.1em;background:#fff;color:#000;margin-top:20px">GEM SESSION</button>';
h+='</div>'}
if(v=="setup"){
h+='<div style="padding:20px">';
h+='<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:16px">1RM OG TRAINING MAX</div>';
var lifts=[["squat","Back Squat"],["trapbar","Trap Bar DL"],["bench","Bench Press"],["incline","Incline Bench"]];
for(var li=0;li<lifts.length;li++){var l=lifts[li];
h+='<div style="margin-bottom:14px;padding:12px;background:#111;border-radius:2px">';
h+='<div style="font-size:12px;font-weight:700;margin-bottom:8px">'+l[1]+'</div>';
h+='<div style="display:flex;gap:12px;align-items:center">';
h+='<div><div style="font-size:8px;color:#888;margin-bottom:2px">1RM</div>';
h+='<input type="number" value="'+RM[l[0]]+'" oninput="RM[\''+l[0]+'\']=Number(this.value)||0;TM[\''+l[0]+'\']=calcTM(RM[\''+l[0]+'\']);SV();R()" style="background:#0A0A0A;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;padding:6px 8px;font-size:16px;font-weight:700;width:75px;text-align:center;font-family:inherit;box-sizing:border-box"></div>';
h+='<div><div style="font-size:8px;color:#888;margin-bottom:2px">TM</div>';
h+='<input type="number" value="'+TM[l[0]]+'" oninput="TM[\''+l[0]+'\']=Number(this.value)||0;SV();R()" style="background:#0A0A0A;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;padding:6px 8px;font-size:16px;font-weight:700;width:75px;text-align:center;font-family:inherit;box-sizing:border-box"></div>';
h+='<div style="font-size:9px;color:#555">'+Math.round(TM[l[0]]/(RM[l[0]]||1)*100)+'%</div>';
h+='</div></div>'}
h+='<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px">';

h+='<div style="background:#111;padding:8px;border-radius:2px"><div style="color:#555;font-size:8px">Over</div><div style="color:#4ade80;font-weight:700">&gt;'+HI+' sets = TM +'+INC*100+'%</div></div></div></div>';
h+='<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px">';
h+='<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:10px">BACKUP</div>';

h+='</div>'}
if(v=="progress"){
h+='<div style="padding:20px">';

var plifts=[["squat","Back Squat","A"],["trapbar","Trap Bar DL","B"],["bench","Bench Press","A"],["incline","Incline Bench","B"]];
for(var pli=0;pli<plifts.length;pli++){var pl=plifts[pli];

var mx=0;for(var mi=0;mi<PH.length;mi++){var pp=PH[mi];var vv=Number((LOGS["w"+pp.wk]&&LOGS["w"+pp.wk][pl[2]]&&LOGS["w"+pp.wk][pl[2]]["act_"+pl[0]])||0);if(vv>mx)mx=vv}

<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0A">
<title>MARATHON SBS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0A;color:#fff;font-family:'DM Sans',sans-serif;max-width:520px;margin:0 auto;min-height:100vh}
input:focus,textarea:focus{outline:none;border-color:rgba(255,255,255,0.3)!important}
button{font-family:inherit;cursor:pointer}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
textarea{font-family:inherit;resize:vertical}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="a"></div>
<script>
// === SBS ENGINE ===
var RND=2.5,TM_PCT=0.90,LO=4,HI=6,INC=0.02,DEC=-0.05;
function rnd(v){return Math.round(v/RND)*RND}
function calcTM(rm){return rnd(rm*TM_PCT)}
function calcTgt(tm,int){return rnd(tm*int)}
function sbsSt(done,goal){if(done===undefined||done==="")return null;var p=goal.split("-").map(Number);var lo=p[0],hi=p[1]||p[0];done=Number(done);if(done<lo)return{l:"\u2193 TM falder",n:DEC};if(done>hi)return{l:"\u2191 TM stiger",n:INC};return{l:"\u2713 OK",n:0}}
function nxtTM(tm,adj){return rnd(tm*(1+adj))}

// === PHASES ===
var PH=[
{wk:14,ph:“Fundament”,int:0.80,reps:3,rir:2,sg:“4-6”},
{wk:15,ph:“Progression”,int:0.85,reps:2,rir:2,sg:“4-6”},
{wk:16,ph:“Intensitet”,int:0.875,reps:2,rir:1,sg:“4-6”},
{wk:17,ph:“Taper”,int:0.775,reps:4,rir:3,sg:“2-4”},
{wk:18,ph:“Minimal”,int:0.70,reps:5,rir:2,sg:“2-3”}
];

// === SESSION TEMPLATES ===
function sessA(wk){var p=PH.find(function(x){return x.wk==wk});var tp=wk>=17;return{day:“MANDAG”,type:“FULL BODY A”,ex:[
{n:“Box Jumps”,s:tp?“2\u00d73”:“3\u00d73”,cat:“POWER”},
{n:”\u2605 Back Squat”,sbs:1,lift:“squat”,cat:“STRENGTH”},
{n:“Kettlebell Swings”,s:tp?“1\u00d78”:“2\u00d78”,cat:“STRENGTH”},
{n:“Bench Press”,sbs:1,lift:“bench”,cat:“STRENGTH”,note:“Superset med pull-up”},
{n:“Pull-up / Lat Pulldown”,s:tp?“3\u00d76-8”:“4\u00d76-8”,cat:“STRENGTH”},
{n:“Tempo RDL (3s ecc.)”,s:tp?“1\u00d78”:“2\u00d78-10”,cat:“ACCESSORIES”},
{n:“Standing Calf Raise”,s:“2\u00d7”+(tp?“8-10”:“10-12”),cat:“ACCESSORIES”},
{n:“Pallof Press”,s:“2\u00d7”+(tp?“8ea”:“10ea”),cat:“ACCESSORIES”}
]}}
function sessB(wk){var p=PH.find(function(x){return x.wk==wk});var tp=wk>=17;return{day:“FREDAG”,type:“FULL BODY B”,ex:[
{n:“Broad Jumps”,s:tp?“2\u00d73”:“3\u00d73”,cat:“POWER”},
{n:”\u2605 Trap Bar Deadlift”,sbs:1,lift:“trapbar”,cat:“STRENGTH”},
{n:“Bulgarian Split Squat”,s:tp?“1\u00d76-8ea”:“2\u00d76-8ea”,cat:“STRENGTH”},
{n:“Incline Bench”,sbs:1,lift:“incline”,cat:“STRENGTH”,note:“Superset med row”},
{n:“DB Chest Supported Row”,s:tp?“2\u00d78-10”:“3\u00d78-10”,cat:“STRENGTH”},
{n:“Tibialis Raises”,s:“2\u00d715-20”,cat:“ACCESSORIES”},
{n:“Copenhagen Plank”,s:“2\u00d720-30s ea”,cat:“ACCESSORIES”},
{n:“DB Lateral Raises”,s:tp?“1\u00d712-15”:“2\u00d712-15”,cat:“ACCESSORIES”},
{n:“Dead Bug”,s:tp?“1\u00d78ea”:“2\u00d78ea”,cat:“ACCESSORIES”}
]}}

// === STORAGE ===
var SK=“msbs-v2”;
function LD(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function SV(){localStorage.setItem(SK,JSON.stringify({rm:RM,tm:TM,bw:BW,logs:LOGS,cwk:S.cwk}))}
var S={vw:“dash”,cwk:14,sess:null,stype:””};
var RM={squat:100,trapbar:130,bench:90,incline:70};
var TM={squat:90,trapbar:117,bench:81,incline:63};
var BW=95;
var LOGS={};
var st=LD();if(st.rm)RM=st.rm;if(st.tm)TM=st.tm;if(st.bw)BW=st.bw;if(st.logs)LOGS=st.logs;if(st.cwk)S.cwk=st.cwk;

// Session log helpers
var SLOG={};
function uSL(k,v){SLOG[k]=v}
function E(s){return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”)}
function doExport(){var b=new Blob([JSON.stringify({rm:RM,tm:TM,bw:BW,logs:LOGS},null,2)],{type:“application/json”});var u=URL.createObjectURL(b);var a=document.createElement(“a”);a.href=u;a.download=“msbs-”+new Date().toISOString().slice(0,10)+”.json”;document.body.appendChild(a);a.click();document.body.removeChild(a)}
function doImport(){var inp=document.createElement(“input”);inp.type=“file”;inp.accept=”.json”;inp.onchange=function(ev){var f=ev.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.rm)RM=d.rm;if(d.tm)TM=d.tm;if(d.bw)BW=d.bw;if(d.logs)LOGS=d.logs;SV();R();alert(“Importeret!”)}catch(x){alert(“Fejl”)}};rd.readAsText(f)};inp.click()}

function saveSess(){
var wk=“w”+S.cwk,sk=S.stype;
if(!LOGS[wk])LOGS[wk]={};
LOGS[wk][sk]=Object.assign({},SLOG,{at:new Date().toISOString()});
// SBS TM adjustments
var sess=S.stype==“A”?sessA(S.cwk):sessB(S.cwk);
sess.ex.forEach(function(ex){
if(ex.sbs&&SLOG[“sets_”+ex.lift]){
var st=sbsSt(SLOG[“sets_”+ex.lift],PH.find(function(p){return p.wk==S.cwk}).sg);
if(st&&st.n!==0)TM[ex.lift]=nxtTM(TM[ex.lift],st.n);
}});
SV();S.vw=“dash”;R();
}

// === RENDER ===
function R(){
var v=S.vw,cwk=S.cwk,p=PH.find(function(x){return x.wk==cwk});
var h=’<div style="padding:20px 20px 0;border-bottom:1px solid rgba(255,255,255,0.08)">’;
h+=’<div style="font-size:10px;letter-spacing:0.2em;color:#555;font-weight:600">MARATHON STYRKE // SBS AUTOREGULERING</div>’;
h+=’<div style="font-size:26px;font-weight:900;margin-top:2px">MARATHON SBS</div>’;
h+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;padding-bottom:12px">’;
h+=’<div style="font-size:11px;color:#555;letter-spacing:0.1em">UGE 14\u201318 // 2 DAYS/WEEK</div>’;
h+=’<div style="font-size:11px;color:#fff;font-weight:700;background:#111;padding:3px 10px;border-radius:2px">UGE ‘+cwk+’</div></div>’;
h+=’<div style="display:flex;gap:20px">’;
[“dash”,“session”,“setup”,“progress”].forEach(function(t){
var lb=t==“dash”?“PROGRAM”:t==“session”?“SESSION”:t.toUpperCase();
h+=’<button onclick="S.vw=\''+t+'\';R()" style="background:none;border:none;padding-bottom:10px;color:'+(v==t?'#fff':'#555')+';font-size:11px;font-weight:600;letter-spacing:0.12em;border-bottom:2px solid '+(v==t?'#fff':'transparent')+'">’+lb+’</button>’});
h+=’</div></div>’;

// === DASHBOARD ===
if(v==“dash”){
h+=’<div style="padding:20px">’;
// Countdown
var days=Math.max(0,Math.ceil((new Date(“2026-05-10”)-new Date())/86400000));
h+=’<div style="text-align:center;padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:20px">’;
h+=’<div style="font-size:48px;font-weight:900">’+days+’</div>’;
h+=’<div style="font-size:10px;letter-spacing:0.2em;color:#555;font-weight:600">DAGE TIL MARATHON // 10. MAJ 2026</div></div>’;
// Phase selector
h+=’<div style="margin-bottom:20px"><div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:8px">FASE: ‘+p.ph.toUpperCase()+’ // ‘+Math.round(p.int*100)+’% TM \u00b7 ‘+p.reps+’ reps \u00b7 RIR ‘+p.rir+’</div>’;
h+=’<div style="display:flex;gap:6px">’;
PH.forEach(function(pp){
var sel=pp.wk==cwk,done=LOGS[“w”+pp.wk];
h+=’<button onclick="S.cwk='+pp.wk+';SV();R()" style="flex:1;height:6px;border-radius:2px;border:none;cursor:pointer;background:'+(sel?'#fff':done?'#4ade80':'#222')+'"></button>’});
h+=’</div>’;
h+=’<div style="display:flex;justify-content:space-between;margin-top:4px">’;
PH.forEach(function(pp){h+=’<span onclick="S.cwk='+pp.wk+';SV();R()" style="font-size:9px;color:'+(pp.wk==cwk?'#fff':'#555')+';cursor:pointer;flex:1;text-align:center">U’+pp.wk+’</span>’});
h+=’</div></div>’;
// Session cards
var aLog=LOGS[“w”+cwk]&&LOGS[“w”+cwk].A,bLog=LOGS[“w”+cwk]&&LOGS[“w”+cwk].B;
h+=’<div style="display:flex;gap:10px;margin-bottom:20px">’;
[[“A”,“MANDAG”,“FULL BODY A”,“Squat \u00b7 Bench \u00b7 Posterior”,aLog],[“B”,“FREDAG”,“FULL BODY B”,“Trap Bar \u00b7 Incline \u00b7 Prev”,bLog]].forEach(function(c){
h+=’<button onclick="S.stype=\''+c[0]+'\';SLOG=LOGS[\'w'+cwk+'\']&&LOGS[\'w'+cwk+'\'][\''+c[0]+'\']||{};S.vw=\'session\';R()" style="flex:1;background:'+(c[4]?'rgba(74,222,128,0.04)':'#111')+';border:1px solid '+(c[4]?'rgba(74,222,128,0.15)':'rgba(255,255,255,0.06)')+';border-radius:2px;padding:14px;text-align:left">’;
h+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:11px;font-weight:800;letter-spacing:0.1em">SESSION ‘+c[0]+’</span>’+(c[4]?’<span style="font-size:12px">\u2705</span>’:’’)+’</div>’;
h+=’<div style="font-size:10px;color:#888">’+c[1]+’ \u00b7 ‘+c[2]+’</div>’;
h+=’<div style="font-size:9px;color:#555;margin-top:4px">’+c[3]+’</div>’;
h+=’<div style="font-size:10px;color:#fff;font-weight:700;margin-top:8px">’+(c[4]?‘SE LOG \u2192’:‘START \u2192’)+’</div></button>’});
h+=’</div>’;
// TM overview
h+=’<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:16px">’;
h+=’<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:10px">TRAINING MAX OVERSIGT</div>’;
[[“squat”,“Back Squat”],[“trapbar”,“Trap Bar DL”],[“bench”,“Bench Press”],[“incline”,“Incline Bench”]].forEach(function(l){
h+=’<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)">’;
h+=’<span style="font-size:12px;color:#999">’+l[1]+’</span>’;
h+=’<div><span style="font-size:16px;font-weight:800">’+TM[l[0]]+’</span><span style="font-size:10px;color:#555"> kg</span>’;
h+=’<span style="font-size:10px;color:#666;margin-left:10px">\u2192 ‘+calcTgt(TM[l[0]],p.int)+’ kg</span></div></div>’});
h+=’</div>’;
if(cwk==18){h+=’<div style="margin-top:20px;padding:16px;border:1px solid rgba(255,255,255,0.1);border-radius:2px;text-align:center"><div style="font-size:18px;font-weight:900">RACE WEEK</div><div style="font-size:11px;color:#666;margin-top:4px">Stop styrke efter mandag. Hvil til marathon.</div></div>’}
h+=’</div>’}

// === SESSION ===
if(v==“session”){
var sess=S.stype==“A”?sessA(cwk):sessB(cwk);
h+=’<div style="padding:20px">’;
h+=’<button onclick="S.vw=\'dash\';R()" style="background:none;border:none;color:#888;font-size:12px;font-weight:600;padding:0;margin-bottom:12px">\u2190 Tilbage</button>’;
h+=’<div style="font-size:10px;color:#555;letter-spacing:0.12em;font-weight:600">UGE ‘+cwk+’ \u2014 ‘+p.ph.toUpperCase()+’</div>’;
h+=’<div style="font-size:20px;font-weight:900;margin-bottom:16px">’+sess.day+’ \u2014 ‘+sess.type+’</div>’;
var curCat=””;
sess.ex.forEach(function(ex,i){
if(ex.cat!=curCat){curCat=ex.cat;
var cc=curCat==“POWER”?”#f0a030”:curCat==“STRENGTH”?”#fff”:”#666”;
h+=’<div style="font-size:9px;letter-spacing:0.2em;color:'+cc+';font-weight:700;margin-top:16px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06)">’+curCat+’</div>’}
if(ex.sbs){
var tm=TM[ex.lift],tgt=calcTgt(tm,p.int);
var sd=SLOG[“sets_”+ex.lift],status=sbsSt(sd,p.sg);
var sc=!status?”#555”:status.n>0?”#4ade80”:status.n<0?”#e55”:”#eab308”;
h+=’<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)">’;
h+=’<div style="font-size:13px;font-weight:800">’+E(ex.n)+’<span style="font-size:9px;color:#888;margin-left:6px;font-weight:600">SBS</span></div>’;
if(ex.note)h+=’<div style="font-size:9px;color:#555;margin-top:2px">’+E(ex.note)+’</div>’;
h+=’<div style="font-size:10px;color:#666;margin-top:4px">M\u00e5l: ‘+p.sg+’ s\u00e6t \u00d7 ‘+p.reps+’ reps @ ‘+tgt+’ kg (’+Math.round(p.int*100)+’% TM) \u00b7 RIR ‘+p.rir+’</div>’;
h+=’<div style="display:flex;gap:8px;margin-top:8px;align-items:center">’;
h+=’<div><div style="font-size:8px;color:#555;margin-bottom:2px">ACTUAL KG</div>’;
h+=’<input type=“number” value=”’+E(SLOG[“act_”+ex.lift]||tgt)+’” oninput=“uSL('act_’+ex.lift+’',this.value)” style=“background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:#fff;padding:6px 8px;font-size:14px;font-weight:700;width:70px;font-family:inherit;text-align:center;box-sizing:border-box”></div>’;
h+=’<div><div style="font-size:8px;color:#555;margin-bottom:2px">SETS DONE</div>’;
h+=’<input type=“number” value=”’+E(sd||””)+’” oninput=“uSL('sets_’+ex.lift+’',this.value);R()” placeholder=”’+p.sg+’” style=“background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:#fff;padding:6px 8px;font-size:14px;font-weight:700;width:70px;font-family:inherit;text-align:center;box-sizing:border-box”></div>’;
h+=’<div style="text-align:center"><div style="font-size:8px;color:#555;margin-bottom:2px">STATUS</div>’;
h+=’<div style="font-size:13px;font-weight:800;color:'+sc+'">’+(status?status.l:”\u2014”)+’</div></div></div>’;
// Rep per set
h+=’<div style="display:flex;gap:4px;margin-top:6px">’;
for(var si=1;si<=6;si++){h+=’<input type=“number” value=”’+E(SLOG[ex.lift+”*s”+si]||””)+’” oninput=“uSL('’+ex.lift+’*s’+si+’',this.value)” placeholder=“S’+si+’” style=“flex:1;background:#111;border:1px solid rgba(255,255,255,0.04);border-radius:2px;color:#ccc;padding:4px 2px;font-size:9px;text-align:center;font-family:inherit;max-width:38px;box-sizing:border-box”>’}
h+=’<span style="font-size:7px;color:#444;align-self:center">reps</span></div>’;
h+=’</div>’;
}else{
h+=’<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">’;
h+=’<div><div style="font-size:12px;font-weight:600;color:#ccc">’+E(ex.n)+’</div>’;
h+=’<div style="font-size:9px;color:#555">’+E(ex.s)+’</div></div>’;
if(ex.s&&ex.s.indexOf(”\u00d7”)>-1){h+=’<input type=“number” value=”’+E(SLOG[“wt*”+ex.n]||””)+’” oninput=“uSL('wt*’+E(ex.n)+’',this.value)” placeholder=“kg” style=“background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:2px;color:#fff;padding:4px 6px;font-size:11px;width:55px;text-align:center;font-family:inherit;box-sizing:border-box”>’}
h+=’</div>’}
});
// Notes
h+=’<div style="margin-top:20px"><div style="font-size:9px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:4px">SESSION NOTER</div>’;
h+=’<textarea oninput="uSL(\'notes\',this.value)" placeholder="Energi, restitution, noter..." style="width:100%;background:#111;border:1px solid rgba(255,255,255,0.06);border-radius:2px;padding:8px;color:#fff;font-size:11px;min-height:50px;box-sizing:border-box">’+(SLOG.notes||””)+’</textarea></div>’;
// Recovery
h+=’<div style="margin-top:14px"><div style="font-size:9px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:6px">RESTITUTION (1\u201310)</div>’;
h+=’<div style="display:flex;gap:4px">’;
for(var ri=1;ri<=10;ri++){var rc=SLOG.rec==ri?(ri<=3?”#e55”:ri<=6?”#eab308”:”#4ade80”):”#111”;
h+=’<button onclick="uSL(\'rec\','+ri+');R()" style="flex:1;padding:6px 0;border:none;border-radius:2px;font-size:10px;font-weight:700;background:'+rc+';color:'+(SLOG.rec==ri?'#000':'#555')+'">’+ri+’</button>’}
h+=’</div></div>’;
// Save
h+=’<button onclick="saveSess()" style="width:100%;padding:14px;border:none;border-radius:2px;font-size:13px;font-weight:800;letter-spacing:0.1em;background:#fff;color:#000;margin-top:20px">GEM SESSION</button>’;
h+=’</div>’}

// === SETUP ===
if(v==“setup”){
h+=’<div style="padding:20px">’;
h+=’<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:16px">1RM & TRAINING MAX</div>’;
[[“squat”,“Back Squat”],[“trapbar”,“Trap Bar Deadlift”],[“bench”,“Bench Press”],[“incline”,“Incline Bench”]].forEach(function(l){
h+=’<div style="margin-bottom:14px;padding:12px;background:#111;border-radius:2px">’;
h+=’<div style="font-size:12px;font-weight:700;margin-bottom:8px">’+l[1]+’</div>’;
h+=’<div style="display:flex;gap:12px;align-items:center">’;
h+=’<div><div style="font-size:8px;color:#888;margin-bottom:2px">1RM (kg)</div>’;
h+=’<input type="number" value="'+RM[l[0]]+'" oninput="RM[\''+l[0]+'\']=Number(this.value)||0;TM[\''+l[0]+'\']=calcTM(RM[\''+l[0]+'\']);SV();R()" style="background:#0A0A0A;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;padding:6px 8px;font-size:16px;font-weight:700;width:75px;text-align:center;font-family:inherit;box-sizing:border-box"></div>’;
h+=’<div><div style="font-size:8px;color:#888;margin-bottom:2px">TM (kg)</div>’;
h+=’<input type="number" value="'+TM[l[0]]+'" oninput="TM[\''+l[0]+'\']=Number(this.value)||0;SV();R()" style="background:#0A0A0A;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;padding:6px 8px;font-size:16px;font-weight:700;width:75px;text-align:center;font-family:inherit;box-sizing:border-box"></div>’;
h+=’<div style="font-size:9px;color:#555">’+Math.round(TM[l[0]]/(RM[l[0]]||1)*100)+’% af 1RM</div>’;
h+=’</div></div>’});
// SBS params
h+=’<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px">’;
h+=’<div style="font-size:10px;letter-spacing:0.15em;color:#555;font-weight:600;margin-bottom:10px">SBS AUTOREGULERING</div>’;
h+=’<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:10px">’;
h+=’<div style="background:#111;padding:8px;border-radius:2px"><div style="color:#555;font-size:8px">Nedre gr\u00e6nse</div><div style="color:#e55;font-weight:700">< ‘+LO+’ sets \u2192 TM \u2193’+Math.abs(DEC*100)+’%</div></div>’;
h+=’<div style="background:#111;padding:8px;border-radius:2px"><div style="color:#555;font-size:8px">\u00d8vre gr\u00e6nse</div><div style="color:#4ade80;font-weight:700">> ‘+HI+’ sets \u2192 TM \u2191’+INC*100+’%</div></div>’;
h+=’<div style="background:#111;padding:8px;border-radius:2px"><div style="color:#555;font-size:8px">Afrunding</div><div style="font-weight:700">’+RND+’ kg</div></div>’;
